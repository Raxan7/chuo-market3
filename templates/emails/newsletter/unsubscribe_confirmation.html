{% load sanitize_tags %}
<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background:#f6f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <div style="max-width:640px;margin:0 auto;padding:24px;">
      <div style="background:#ffffff;border-radius:18px;overflow:hidden;box-shadow:0 12px 40px rgba(15,23,42,0.08);padding:28px;">
        <p style="margin:0 0 8px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;">{{ site_name }}</p>
        <h1 style="margin:0 0 12px;font-size:28px;line-height:1.2;">Confirm newsletter unsubscribe</h1>
        <p style="margin:0 0 24px;font-size:16px;line-height:1.7;color:#4b5563;">Hi {{ display_name }}, click the button below to stop receiving newsletter emails.</p>
        <a href="{{ confirmation_url |safe_href }}" style="display:inline-block;background:#dc2626;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:999px;font-weight:700;">Confirm unsubscribe</a>
        <p style="margin:24px 0 0;font-size:13px;line-height:1.6;color:#6b7280;">If you did not request this change, you can safely ignore this email.</p>
      </div>
    </div>
  </body>
</html>
