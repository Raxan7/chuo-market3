{% extends 'app/base.html' %}
{% block title %}Newsletter Confirmation{% endblock title %}

{% block main-content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5 text-center">
          {% if status == 'success' %}
            <h3 class="mb-3 text-success">Newsletter updated</h3>
          {% else %}
            <h3 class="mb-3 text-danger">Could not update newsletter</h3>
          {% endif %}
          <p class="mb-4">{{ message }}</p>
          <a href="{% url 'profile' %}" class="btn btn-primary">Return to profile</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock main-content %}
