{% extends "app/base.html" %}

{% block title %}Certificate Preview{% endblock title %}

{% block main-content %}
<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">{{ template.title }}</h1>
            <p class="text-muted mb-0">{{ template.course.title }}</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'lms:certificate_template_edit' template.pk %}" class="btn btn-outline-primary">Edit</a>
            <a href="{% url 'lms:certificate_template_list' %}" class="btn btn-outline-secondary">Back</a>
        </div>
    </div>
    {% include "lms/certificates/preview_card.html" %}
</div>
{% endblock main-content %}
